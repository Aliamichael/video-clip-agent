<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Clip Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Video Clip Agent</h1>
            <p>Extract engaging clips from YouTube videos for social media</p>
        </header>

        <main>
            <div class="input-section">
                <div class="form-group">
                    <label for="videoUrl">YouTube Video URL</label>
                    <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="platform">Target Platform</label>
                        <select id="platform">
                            <option value="all">All Platforms</option>
                            <option value="youtube">YouTube / YouTube Shorts</option>
                            <option value="instagram">Instagram Reels</option>
                            <option value="facebook">Facebook</option>
                            <option value="tiktok">TikTok</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="aiModel">AI Processing</label>
                        <select id="aiModel">
                            <option value="local">Local (Free)</option>
                            <option value="openai">OpenAI (Better Quality)</option>
                        </select>
                    </div>
                </div>

                <button id="processBtn" class="btn-primary">
                    <span class="btn-text">Extract Clips</span>
                    <span class="btn-loading" style="display: none;">
                        <span class="spinner"></span>
                        Processing...
                    </span>
                </button>
            </div>

            <div id="progressSection" class="progress-section" style="display: none;">
                <div class="progress-header">
                    <h3>Processing Video</h3>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="statusText" class="status-text">Initializing...</p>
            </div>

            <div id="resultsSection" class="results-section" style="display: none;">
                <h2>Extracted Clips</h2>
                <div id="clipsList" class="clips-grid"></div>
            </div>

            <div id="momentsSection" class="moments-section" style="display: none;">
                <h2>Key Moments Detected</h2>
                <div id="momentsList" class="moments-list"></div>
            </div>
        </main>

        <div class="config-panel">
            <button id="configToggle" class="btn-config">Settings</button>
            <div id="configContent" class="config-content" style="display: none;">
                <div class="form-group">
                    <label for="openaiKey">OpenAI API Key</label>
                    <input type="password" id="openaiKey" placeholder="sk-...">
                </div>
                <button id="saveConfig" class="btn-secondary">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
